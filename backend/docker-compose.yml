version: '3.8'
services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oak_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-OakMaster2026!}
      POSTGRES_DB: ${POSTGRES_DB:-oakcred}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    image: 077757636844.dkr.ecr.eu-north-1.amazonaws.com/oakcred-backend:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-oak_admin}:${POSTGRES_PASSWORD:-OakMaster2026!}@db:5432/${POSTGRES_DB:-oakcred}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_for_production}
      - JWT_EXPIRES_IN=24h
      - PORT=3000
      - FRONTEND_URL=http://localhost:5173
      - NODE_ENV=development
      - EMAIL_USER=singhan@oakcred.com
      - EMAIL_PASS=vqnw dllb lssc rfzg
      - GEMINI_API_KEY=AIzaSyCEMOuBvqRlqWb2gyE7cQi4jcUobt3a5F4
    depends_on:
      - db
      - redis
    # The command runs DB migrations safely then starts the app
    command: /bin/sh -c "npx prisma migrate deploy && (npm run seed || true) && node src/server.js"

volumes:
  pgdata:
