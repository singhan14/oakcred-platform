name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: oakcred-backend
  EC2_HOST: 16.171.254.32

jobs:
  deploy:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ env.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | sudo docker login --username AWS --password-stdin 077757636844.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          cd oakcred-platform/backend
          # Self-heal out-of-sync docker-compose
          cat <<EOF > docker-compose.yml
          version: '3.8'
          services:
            db:
              image: postgres:14-alpine
              restart: always
              environment:
                POSTGRES_USER: \${POSTGRES_USER:-oak_admin}
                POSTGRES_PASSWORD: \${POSTGRES_PASSWORD:-OakMaster2026!}
                POSTGRES_DB: \${POSTGRES_DB:-oakcred}
              ports:
                - "5432:5432"
              volumes:
                - pgdata:/var/lib/postgresql/data

            redis:
              image: redis:7-alpine
              restart: always
              ports:
                - "6379:6379"

            api:
              image: 077757636844.dkr.ecr.eu-north-1.amazonaws.com/oakcred-backend:latest
              restart: always
              ports:
                - "3000:3000"
              environment:
                - DATABASE_URL=postgresql://\${POSTGRES_USER:-oak_admin}:\${POSTGRES_PASSWORD:-OakMaster2026!}@db:5432/\${POSTGRES_DB:-oakcred}?schema=public
                - REDIS_URL=redis://redis:6379
                - JWT_SECRET=\${JWT_SECRET:-your_super_secret_jwt_key_for_production}
                - JWT_EXPIRES_IN=24h
                - PORT=3000
                - FRONTEND_URL=\${FRONTEND_URL}
                - NODE_ENV=production
              depends_on:
                - db
                - redis
              command: /bin/sh -c "npx prisma migrate deploy && (npm run seed || true) && node src/server.js"

          volumes:
            pgdata:
          EOF
          # COMPLETE RESET: Stop containers and delete database volumes
          sudo docker compose down -v
          sudo docker compose pull api
          sudo docker compose up -d
